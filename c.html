<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopEase</title>
<style>
:root{--primary:#5c6ac4;--accent:#ff6b6b;--bg:#f7f8fc;--muted:#6b7280;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:var(--bg);color:#1f2333;}
a{text-decoration:none;color:inherit;}
.navbar{display:flex;justify-content:space-between;align-items:center;padding:16px 32px;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.06);position:sticky;top:0;z-index:50;}
.logo{font-size:1.5rem;font-weight:800;color:var(--primary);cursor:pointer;}
.logo span{color:var(--accent);}
.navbar nav{display:flex;align-items:center;gap:20px;}
.cart-btn{position:relative;font-size:1.3rem;background:none;border:none;cursor:pointer;}
.badge{background:var(--accent);color:#fff;border-radius:20px;padding:1px 7px;font-size:.72rem;position:absolute;top:-8px;right:-12px;}
.hero{background:linear-gradient(120deg,#5c6ac4,#8e7cf0);color:#fff;text-align:center;padding:70px 20px;}
.hero h1{font-size:2.5rem;margin-bottom:12px;}
.container{max-width:1100px;margin:auto;padding:32px 20px;}
.toolbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;margin-bottom:24px;}
.cats{display:flex;gap:10px;flex-wrap:wrap;}
.cats button{padding:8px 18px;border:1px solid #ddd;border-radius:20px;background:#fff;cursor:pointer;}
.cats button.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.toolbar input{padding:9px 16px;border:1px solid #ddd;border-radius:20px;outline:none;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:22px;}
.card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 4px 14px rgba(0,0,0,.05);transition:.2s;}
.card:hover{transform:translateY(-5px);box-shadow:0 12px 26px rgba(0,0,0,.12);}
.thumb{height:170px;display:flex;align-items:center;justify-content:center;font-size:4rem;background:#eef1ff;}
.card-body{padding:16px;}
.card-body .cat{color:var(--muted);font-size:.8rem;}
.desc{color:var(--muted);font-size:.85rem;margin:8px 0;}
.price{font-weight:800;color:var(--primary);font-size:1.15rem;margin-bottom:12px;}
.old{color:var(--muted);text-decoration:line-through;font-size:.85rem;margin-left:8px;}
.card-body button{width:100%;padding:10px;border:none;border-radius:8px;background:var(--primary);color:#fff;font-weight:600;cursor:pointer;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);opacity:0;visibility:hidden;transition:.3s;z-index:200;}
.overlay.open{opacity:1;visibility:visible;}
.drawer{position:fixed;top:0;right:-400px;width:370px;max-width:90vw;height:100%;background:#fff;z-index:300;transition:.3s;display:flex;flex-direction:column;padding:24px;}
.drawer.open{right:0;}
.drawer h2{margin-bottom:18px;display:flex;justify-content:space-between;}
.close{cursor:pointer;background:none;border:none;font-size:1.4rem;}
.cart-items{flex:1;overflow-y:auto;}
.cart-item{display:flex;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid #eee;}
.cart-item .emoji{font-size:2rem;}
.cart-item .info{flex:1;}
.qty{display:flex;align-items:center;gap:8px;margin-top:4px;}
.qty button{width:24px;height:24px;border:none;border-radius:6px;background:#eee;cursor:pointer;}
.rm{color:var(--accent);cursor:pointer;background:none;border:none;font-weight:600;}
.cart-total{padding-top:18px;font-size:1.2rem;font-weight:800;display:flex;justify-content:space-between;}
.checkout{margin-top:16px;background:var(--accent);color:#fff;border:none;padding:14px;border-radius:24px;font-weight:700;cursor:pointer;}
.empty{text-align:center;color:var(--muted);margin-top:40px;grid-column:1/-1;}
footer{background:#1f2333;color:#cbd0e0;padding:30px;text-align:center;margin-top:40px;font-size:.9rem;}
@media(max-width:640px){.hero h1{font-size:2rem;}}
</style>
</head>
<body>
<header class="navbar">
  <div class="logo" onclick="location.reload()">Shop<span>Ease</span></div>
  <nav>
    <input placeholder="Search..." oninput="search(this.value)">
    <button class="cart-btn" onclick="toggleCart(true)">🛒<span class="badge" id="count">0</span></button>
  </nav>
</header>

<section class="hero">
  <h1>Shop Smarter, Live Better</h1>
  <p>Top products at unbeatable prices. Free shipping over $50!</p>
</section>

<div class="container">
  <div class="toolbar">
    <div class="cats" id="cats"></div>
  </div>
  <div class="grid" id="grid"></div>
</div>

<div class="overlay" id="overlay" onclick="toggleCart(false)"></div>
<aside class="drawer" id="drawer">
  <h2>Your Cart <button class="close" onclick="toggleCart(false)">✕</button></h2>
  <div class="cart-items" id="items"></div>
  <div class="cart-total"><span>Total:</span><span id="total">$0.00</span></div>
  <button class="checkout" onclick="checkout()">Checkout</button>
</aside>

<footer>© 2024 ShopEase. Built with ❤️</footer>

<script>
const products=[
{id:1,name:"Wireless Headphones",cat:"Electronics",price:79.99,old:99.99,emoji:"🎧",desc:"Noise-cancelling, 30h battery."},
{id:2,name:"Smart Watch",cat:"Electronics",price:129,old:159,emoji:"⌚",desc:"Fitness & heart-rate tracking."},
{id:3,name:"White Sneakers",cat:"Fashion",price:64.5,old:89,emoji:"👟",desc:"Comfortable everyday sneakers."},
{id:4,name:"Leather Backpack",cat:"Fashion",price:112,old:0,emoji:"🎒",desc:"Genuine leather with laptop slot."},
{id:5,name:"Sunglasses",cat:"Fashion",price:39.99,old:55,emoji:"🕶️",desc:"UV400 polarized lenses."},
{id:6,name:"Coffee Maker",cat:"Home",price:89,old:0,emoji:"☕",desc:"Programmable 12-cup maker."},
{id:7,name:"Desk Lamp",cat:"Home",price:34.99,old:44.99,emoji:"💡",desc:"Adjustable LED brightness."},
{id:8,name:"Bluetooth Speaker",cat:"Electronics",price:49.99,old:69.99,emoji:"🔊",desc:"Waterproof, deep bass."},
{id:9,name:"Perfume",cat:"Beauty",price:59,old:0,emoji:"🧴",desc:"Long-lasting fragrance 50ml."},
{id:10,name:"Handbag",cat:"Fashion",price:95,old:130,emoji:"👜",desc:"Elegant designer handbag."},
];
let cart=JSON.parse(localStorage.getItem('cart')||'{}'),activeCat="All",term="";
const cats=["All",...new Set(products.map(p=>p.cat))];
document.getElementById('cats').innerHTML=cats.map(c=>`<button class="${c=='All'?'active':''}" onclick="filter('${c}',this)">${c}</button>`).join('');
function filter(c,el){activeCat=c;document.querySelectorAll('.cats button').forEach(b=>b.classList.remove('active'));el.classList.add('active');render();}
function search(v){term=v.toLowerCase();render();}
function render(){
  const list=products.filter(p=>(activeCat=="All"||p.cat==activeCat)&&p.name.toLowerCase().includes(term));
  document.getElementById('grid').innerHTML=list.length?list.map(p=>`
    <div class="card"><div class="thumb">${p.emoji}</div><div class="card-body">
    <h3>${p.name}</h3><span class="cat">${p.cat}</span><p class="desc">${p.desc}</p>
    <div class="price">$${p.price.toFixed(2)}${p.old?`<span class="old">$${p.old.toFixed(2)}</span>`:''}</div>
    <button onclick="add(${p.id})">Add to Cart</button></div></div>`).join(''):`<p class="empty">No products found 😔</p>`;
}
function add(id){cart[id]=(cart[id]||0)+1;save();toggleCart(true);}
function remove(id){delete cart[id];save();}
function changeQty(id,d){cart[id]=Math.max(1,(cart[id]||1)+d);save();}
function save(){localStorage.setItem('cart',JSON.stringify(cart));update();}
function update(){
  const ids=Object.keys(cart);let total=0,count=0;
  document.getElementById('items').innerHTML=ids.length?ids.map(id=>{
    const p=products.find(x=>x.id==id),q=cart[id];total+=p.price*q;count+=q;
    return `<div class="cart-item"><span class="emoji">${p.emoji}</span><div class="info">
    <strong>${p.name}</strong><div>$${p.price.toFixed(2)}</div>
    <div class="qty"><button onclick="changeQty(${id},-1)">−</button><span>${q}</span><button onclick="changeQty(${id},1)">+</button></div>
    </div><button class="rm" onclick="remove(${id})">✕</button></div>`;
  }).join(''):`<p class="empty">Your cart is empty 🛒</p>`;
  document.getElementById('total').textContent='$'+total.toFixed(2);
  document.getElementById('count').textContent=count;
}
function toggleCart(o){document.getElementById('drawer').classList.toggle('open',o);document.getElementById('overlay').classList.toggle('open',o);}
function checkout(){if(!Object.keys(cart).length)return alert("Cart is empty!");alert("🎉 Thank you for your order!");cart={};save();toggleCart(false);}
render();update();
</script>
</body>
</html>
